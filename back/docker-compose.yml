services:
  postgres:
    image: postgres:16
    container_name: polyclinic-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polyclinic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: polyclinic-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: polyclinic-back
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "
        pnpm prisma generate &&
        pnpm prisma migrate deploy &&
        node dist/main.js
      "
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: polyclinic-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
